
<h2 class="sr-only">Study hub for Lecture 4 — ImageView, CheckBox, RadioButton, ToggleButton, and Spinner Android UI components</h2>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
.tab-bar{display:flex;gap:6px;padding:1rem 0 0.5rem;flex-wrap:wrap;}
.tab{padding:6px 14px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;font-size:13px;color:var(--color-text-secondary);cursor:pointer;}
.tab.active{background:var(--color-background-secondary);color:var(--color-text-primary);border-color:var(--color-border-primary);font-weight:500;}
.sec{display:none;padding:1rem 0;}
.sec.active{display:block;}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;margin-bottom:10px;}
.card-q{font-size:15px;color:var(--color-text-primary);margin-bottom:6px;}
.card-a{font-size:14px;color:var(--color-text-secondary);display:none;border-top:0.5px solid var(--color-border-tertiary);padding-top:8px;margin-top:8px;line-height:1.6;}
.rbtn{font-size:12px;color:var(--color-text-info);cursor:pointer;background:none;border:none;padding:0;}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:var(--border-radius-md);font-weight:500;margin-right:4px;margin-bottom:6px;}
.bp{background:#EEEDFE;color:#3C3489;}
.bt{background:#E1F5EE;color:#085041;}
.bc{background:#FAECE7;color:#712B13;}
.bb{background:#E6F1FB;color:#0C447C;}
.qopt{display:block;width:100%;text-align:left;padding:10px 14px;margin:6px 0;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;font-size:14px;color:var(--color-text-primary);cursor:pointer;}
.qopt.correct{border-color:#0F6E56;background:#E1F5EE;color:#085041;}
.qopt.wrong{border-color:#993C1D;background:#FAECE7;color:#712B13;}
.qfb{font-size:13px;padding:8px 12px;border-radius:var(--border-radius-md);margin-top:8px;display:none;}
.qfb.show{display:block;}
.qfb.ok{background:#E1F5EE;color:#085041;}
.qfb.bad{background:#FAECE7;color:#712B13;}
.nbtn{margin-top:12px;padding:8px 18px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;font-size:13px;cursor:pointer;color:var(--color-text-primary);display:none;}
.prog{font-size:12px;color:var(--color-text-secondary);margin-bottom:12px;}
.sbox{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:1.5rem;text-align:center;display:none;}
.snum{font-size:36px;font-weight:500;color:var(--color-text-primary);}
.cg{margin-bottom:1.5rem;}
.ct{font-size:12px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;}
.cb{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 14px;font-family:var(--font-mono);font-size:12px;color:var(--color-text-primary);margin-bottom:8px;white-space:pre-wrap;line-height:1.6;}
.tgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;}
.tcard{background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-lg);padding:12px;cursor:pointer;text-align:left;}
</style>

<div class="tab-bar">
  <button class="tab active" onclick="showTab('fc')">Flashcards</button>
  <button class="tab" onclick="showTab('qz')">Quiz</button>
  <button class="tab" onclick="showTab('cs')">Cheat sheet</button>
  <button class="tab" onclick="showTab('tp')">Topics</button>
</div>

<div id="fc" class="sec active"></div>
<div id="qz" class="sec">
  <div class="prog" id="qprog">Question 1 of 12</div>
  <div class="card" id="qcard">
    <div class="card-q" id="qq"></div>
    <div id="qopts"></div>
    <div class="qfb" id="qfb"></div>
    <button class="nbtn" id="nbtn" onclick="nextQ()">Next question →</button>
  </div>
  <div class="sbox" id="sbox">
    <div class="snum" id="snum"></div>
    <div style="font-size:14px;color:var(--color-text-secondary);margin:8px 0 16px;">questions correct</div>
    <button class="qopt" style="width:auto;display:inline-block;" onclick="resetQuiz()">Retake quiz</button>
    <button class="qopt" style="width:auto;display:inline-block;margin-left:8px;" onclick="sendPrompt('Give me more exam questions on ImageView, CheckBox, RadioButton, ToggleButton and Spinner in Android')">More questions ↗</button>
  </div>
</div>
<div id="cs" class="sec"></div>
<div id="tp" class="sec">
  <div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:14px;">Click any topic for a deep explanation.</div>
  <div class="tgrid" id="tgrid"></div>
</div>

<script>
const fcs=[
  {q:"What is ImageView used for and what package is it from?",a:"Displays images (PNG, JPEG, vector drawables, bitmaps) in an Android app. Part of android.widget package. Images are placed in res/drawable/ folder and referenced with @drawable/image_name.",tags:["ImageView"]},
  {q:"What are the 4 main scaleType values for ImageView?",a:"centerCrop: fills ImageView, crops if needed. fitCenter: fits inside while keeping aspect ratio. center: centers without scaling. fitXY: fills ImageView ignoring aspect ratio (can distort).",tags:["ImageView"]},
  {q:"How do you change an ImageView's image from Kotlin code?",a:"Use setImageResource(R.drawable.new_image_name) on the ImageView reference.",tags:["ImageView"]},
  {q:"What is android:contentDescription on an ImageView?",a:"Provides an accessibility description for screen readers. Good practice to always include it referencing a string resource: android:contentDescription='@string/image_description'",tags:["ImageView"]},
  {q:"What is a CheckBox and what class is it a subclass of?",a:"A UI component for selecting one or more options. Subclass of CompoundButton. Key attributes: android:text (label text), android:checked (initial state: true/false).",tags:["CheckBox"]},
  {q:"How do you detect CheckBox state changes in Kotlin?",a:"Use setOnCheckedChangeListener { _, isChecked -> ... }. The isChecked boolean tells you if it's now checked or unchecked.",tags:["CheckBox"]},
  {q:"What is the difference between RadioButton and CheckBox?",a:"CheckBox: multiple selections allowed. RadioButton: only ONE can be selected at a time within a RadioGroup. RadioButtons must be wrapped in a RadioGroup to enforce single selection.",tags:["RadioButton"]},
  {q:"How do you detect which RadioButton is selected?",a:"Use radioGroup.setOnCheckedChangeListener { _, checkedId -> when(checkedId) { R.id.rb1 -> ... } }. Or use radioGroup.checkedRadioButtonId to get the selected ID.",tags:["RadioButton"]},
  {q:"What is a ToggleButton and its key XML attributes?",a:"Switches between two states (On/Off). Key attributes: android:textOn (text when ON), android:textOff (text when OFF), android:checked (initial state). Similar to Switch but different appearance.",tags:["ToggleButton"]},
  {q:"How do you handle ToggleButton state changes in Kotlin?",a:"Use setOnCheckedChangeListener { _, isChecked -> if(isChecked) { /* ON */ } else { /* OFF */ } }. Same pattern as CheckBox.",tags:["ToggleButton"]},
  {q:"What is a Spinner and what is it equivalent to in web development?",a:"A dropdown list UI component that lets users pick one item from a predefined set. Equivalent to a <select> dropdown in HTML/web development.",tags:["Spinner"]},
  {q:"What are the steps to set up a Spinner with an ArrayAdapter?",a:"1. Add <Spinner> in XML. 2. Define string-array in strings.xml. 3. Get array: resources.getStringArray(R.array.name). 4. Create adapter: ArrayAdapter.createFromResource(). 5. Set dropdown layout: setDropDownViewResource(). 6. Set adapter: spinner.adapter = adapter.",tags:["Spinner"]},
  {q:"What interface must you implement to handle Spinner selections?",a:"AdapterView.OnItemSelectedListener. Must implement two methods: onItemSelected(parent, view, position, id) and onNothingSelected(parent). Set it with spinner.onItemSelectedListener = this.",tags:["Spinner"]},
  {q:"What is the difference between simple_spinner_item and simple_spinner_dropdown_item?",a:"simple_spinner_item: the layout used to display the currently selected item in the Spinner. simple_spinner_dropdown_item: the layout used to display each item in the dropdown list.",tags:["Spinner"]},
];

const qs=[
  {q:"Which scaleType fills the ImageView and crops the image if necessary?",opts:["fitCenter","center","centerCrop","fitXY"],ans:2,exp:"centerCrop scales the image to fill the entire ImageView, cropping any overflow while maintaining aspect ratio."},
  {q:"Which method changes an ImageView's image from Kotlin code?",opts:["setImage()","setImageResource()","changeImage()","loadImage()"],ans:1,exp:"setImageResource(R.drawable.image_name) is used to change the displayed image programmatically."},
  {q:"CheckBox is a subclass of which class?",opts:["TextView","Button","CompoundButton","View"],ans:2,exp:"CheckBox is a subclass of CompoundButton, which is itself a subclass of Button."},
  {q:"What ensures only one RadioButton can be selected at a time?",opts:["The RadioButton itself","A LinearLayout wrapper","A RadioGroup wrapper","The android:checked attribute"],ans:2,exp:"RadioButtons must be placed inside a RadioGroup. The RadioGroup enforces single selection by deselecting the previous button."},
  {q:"Which attribute sets the text shown on a ToggleButton when it is ON?",opts:["android:textOn","android:onText","android:text","android:toggleOn"],ans:0,exp:"android:textOn sets the label displayed when the ToggleButton is in the checked/ON state."},
  {q:"What is a Spinner equivalent to in web development?",opts:["A text input","A checkbox","A dropdown <select> menu","A radio group"],ans:2,exp:"A Spinner functions like a <select> dropdown in HTML — it lets users pick one item from a list."},
  {q:"Which layout resource is used for the Spinner's dropdown list items?",opts:["simple_spinner_item","simple_list_item_1","simple_spinner_dropdown_item","dropdown_item"],ans:2,exp:"setDropDownViewResource(android.R.layout.simple_spinner_dropdown_item) defines the appearance of each item in the dropdown."},
  {q:"Which interface must you implement to handle Spinner item selections?",opts:["OnClickListener","OnItemSelectedListener","OnCheckedChangeListener","OnSelectListener"],ans:1,exp:"AdapterView.OnItemSelectedListener requires implementing onItemSelected() and onNothingSelected()."},
  {q:"What does android:contentDescription do on an ImageView?",opts:["Sets the image source","Describes the image for screen readers","Sets the scale type","Adds a caption below the image"],ans:1,exp:"contentDescription provides an accessibility label for screen readers, making apps accessible to visually impaired users."},
  {q:"Which method creates an ArrayAdapter from a string-array resource?",opts:["ArrayAdapter()","ArrayAdapter.fromResource()","ArrayAdapter.createFromResource()","new ArrayAdapter()"],ans:2,exp:"ArrayAdapter.createFromResource(context, R.array.array_name, android.R.layout.simple_spinner_item) creates the adapter from strings.xml."},
  {q:"How do you set a CheckBox's initial state to checked in XML?",opts:["android:state='checked'","android:checked='true'","android:isChecked='true'","android:default='true'"],ans:1,exp:"android:checked='true' sets the CheckBox to be checked when the layout first loads."},
  {q:"What listener is used for BOTH CheckBox and ToggleButton state changes?",opts:["setOnClickListener","setOnCheckedChangeListener","setOnStateChangeListener","setOnToggleListener"],ans:1,exp:"setOnCheckedChangeListener { _, isChecked -> ... } works for both CheckBox and ToggleButton since both extend CompoundButton."},
];

const csd=[
  {title:"ImageView — XML",items:["<ImageView\n    android:id=\"@+id/myImageView\"\n    android:layout_width=\"wrap_content\"\n    android:layout_height=\"wrap_content\"\n    android:src=\"@drawable/my_image\"\n    android:scaleType=\"centerCrop\"\n    android:contentDescription=\"@string/image_desc\" />"]},
  {title:"ImageView — change image in Kotlin",items:["myImageView.setImageResource(R.drawable.new_image)"]},
  {title:"CheckBox — XML + Kotlin",items:["<CheckBox\n    android:id=\"@+id/checkBox\"\n    android:layout_width=\"wrap_content\"\n    android:layout_height=\"wrap_content\"\n    android:text=\"Enable Feature\"\n    android:checked=\"false\" />","checkBox.setOnCheckedChangeListener { _, isChecked ->\n    if (isChecked) { /* checked */ } else { /* unchecked */ }\n}"]},
  {title:"RadioButton — XML",items:["<RadioGroup android:id=\"@+id/radioGroup\">\n    <RadioButton android:id=\"@+id/rb1\" android:text=\"Option 1\" />\n    <RadioButton android:id=\"@+id/rb2\" android:text=\"Option 2\" />\n</RadioGroup>","radioGroup.setOnCheckedChangeListener { _, checkedId ->\n    when(checkedId) {\n        R.id.rb1 -> Toast.makeText(this,\"Option 1\",Toast.LENGTH_SHORT).show()\n        R.id.rb2 -> Toast.makeText(this,\"Option 2\",Toast.LENGTH_SHORT).show()\n    }\n}"]},
  {title:"ToggleButton — XML + Kotlin",items:["<ToggleButton\n    android:id=\"@+id/toggle\"\n    android:textOn=\"ON\"\n    android:textOff=\"OFF\"\n    android:checked=\"false\" />","toggle.setOnCheckedChangeListener { _, isChecked ->\n    if (isChecked) { /* ON */ } else { /* OFF */ }\n}"]},
  {title:"Spinner — full setup",items:["// strings.xml:\n<string-array name=\"options\">\n    <item>Option A</item>\n    <item>Option B</item>\n</string-array>","// MainActivity.kt:\nval adapter = ArrayAdapter.createFromResource(\n    this, R.array.options,\n    android.R.layout.simple_spinner_item\n)\nadapter.setDropDownViewResource(\n    android.R.layout.simple_spinner_dropdown_item\n)\nspinner.adapter = adapter\n\nspinner.onItemSelectedListener =\n    object : AdapterView.OnItemSelectedListener {\n        override fun onItemSelected(parent, view, pos, id) {\n            val selected = parent.getItemAtPosition(pos).toString()\n        }\n        override fun onNothingSelected(parent: AdapterView<*>) {}\n    }"]},
];

const topics=[
  {label:"ImageView deep dive",prompt:"Explain Android ImageView thoroughly for my exam: all scaleType values with examples, how to add images to drawable, setting src in XML vs setImageResource in Kotlin, and contentDescription."},
  {label:"CheckBox full explanation",prompt:"Explain Android CheckBox for my exam: XML attributes (id, text, checked), how setOnCheckedChangeListener works with isChecked, and give a full code example."},
  {label:"RadioButton & RadioGroup",prompt:"Explain RadioButton and RadioGroup in Android for my exam: why RadioGroup is needed, how to set a default selection, how setOnCheckedChangeListener works with checkedId, and a full code example."},
  {label:"ToggleButton explained",prompt:"Explain Android ToggleButton for my exam: textOn/textOff attributes, initial checked state, how to handle state changes in Kotlin, and how to customize it with a drawable XML file."},
  {label:"Spinner complete guide",prompt:"Explain Android Spinner fully for my exam: adding it in XML, defining options in strings.xml as string-array, creating ArrayAdapter with createFromResource, setDropDownViewResource, and implementing OnItemSelectedListener with both required methods."},
  {label:"Compare: CheckBox vs RadioButton vs Toggle",prompt:"Compare CheckBox, RadioButton and ToggleButton for my Android exam. When do you use each? What are the XML attributes and Kotlin listeners for each? Give a summary table."},
  {label:"Adapter pattern",prompt:"Explain the Adapter pattern in Android for my exam. What is an ArrayAdapter? How does it connect data to UI components like ListView and Spinner? What is simple_spinner_item vs simple_spinner_dropdown_item?"},
  {label:"All Lecture 4 in one summary",prompt:"Give me a complete exam-ready summary of Lecture 4: ImageView, CheckBox, RadioButton/RadioGroup, ToggleButton, and Spinner. Include the most important attributes and Kotlin patterns for each."},
];

function showTab(id){
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}

function buildFC(){
  const c=document.getElementById('fc');
  c.innerHTML='<div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:12px;">Click "Reveal" to check yourself — all new content from Lecture 4.</div>';
  fcs.forEach((f,i)=>{
    const d=document.createElement('div');
    d.className='card';
    d.innerHTML=`<div class="card-q">${f.q}</div>${f.tags.map(t=>`<span class="badge bp">${t}</span>`).join('')}<div><button class="rbtn" onclick="tog(${i})">Reveal answer</button></div><div class="card-a" id="a${i}">${f.a}</div>`;
    c.appendChild(d);
  });
}
function tog(i){
  const el=document.getElementById('a'+i);
  const btn=el.previousElementSibling.firstChild;
  if(el.style.display==='block'){el.style.display='none';btn.textContent='Reveal answer';}
  else{el.style.display='block';btn.textContent='Hide answer';}
}

let qi=0,sc=0,answered=false;
function renderQ(){
  const q=qs[qi];
  document.getElementById('qprog').textContent=`Question ${qi+1} of ${qs.length}`;
  document.getElementById('qq').textContent=q.q;
  const o=document.getElementById('qopts');o.innerHTML='';
  q.opts.forEach((opt,i)=>{
    const b=document.createElement('button');b.className='qopt';b.textContent=opt;
    b.onclick=()=>checkA(i);o.appendChild(b);
  });
  document.getElementById('qfb').className='qfb';
  document.getElementById('qfb').textContent='';
  document.getElementById('nbtn').style.display='none';
  answered=false;
}
function checkA(i){
  if(answered)return;answered=true;
  const q=qs[qi];
  const opts=document.querySelectorAll('.qopt');
  opts[q.ans].classList.add('correct');
  if(i!==q.ans)opts[i].classList.add('wrong');else sc++;
  const fb=document.getElementById('qfb');
  fb.textContent=(i===q.ans?'✓ Correct! ':'✗ ')+q.exp;
  fb.className='qfb show '+(i===q.ans?'ok':'bad');
  document.getElementById('nbtn').style.display='block';
}
function nextQ(){
  qi++;
  if(qi>=qs.length){
    document.getElementById('qcard').style.display='none';
    document.getElementById('qprog').style.display='none';
    document.getElementById('sbox').style.display='block';
    document.getElementById('snum').textContent=sc+'/'+qs.length;
  }else renderQ();
}
function resetQuiz(){
  qi=0;sc=0;answered=false;
  document.getElementById('qcard').style.display='block';
  document.getElementById('qprog').style.display='block';
  document.getElementById('sbox').style.display='none';
  renderQ();
}

function buildCS(){
  const c=document.getElementById('cs');
  csd.forEach(g=>{
    const d=document.createElement('div');d.className='cg';
    d.innerHTML=`<div class="ct">${g.title}</div>`;
    g.items.forEach(code=>{const p=document.createElement('div');p.className='cb';p.textContent=code;d.appendChild(p);});
    c.appendChild(d);
  });
}

function buildTP(){
  const g=document.getElementById('tgrid');
  topics.forEach(t=>{
    const b=document.createElement('div');b.className='tcard';
    b.innerHTML=`<div style="font-size:13px;color:var(--color-text-primary);">${t.label}</div><div style="font-size:11px;color:var(--color-text-tertiary);margin-top:4px;">Ask Claude ↗</div>`;
    b.onclick=()=>sendPrompt(t.prompt);g.appendChild(b);
  });
}

buildFC();renderQ();buildCS();buildTP();
</script>
